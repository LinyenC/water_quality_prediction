project:
  name: hydrotail_smoke_test
paths:
  dynamic_data: F:\research\water quality prediction\data\dynamic_daily.csv
  static_data: F:\research\water quality prediction\data\static_attributes.csv
  output_dir: F:\research\water quality prediction\outputs\smoke_test_gnn
data:
  station_col: station_id
  date_col: date
  time_frequency: D
  targets:
    conductance: specific_conductance
    turbidity: turbidity
  dynamic_features:
  - discharge
  - precip
  - air_temp
  static_features:
  - latitude
  - longitude
  - watershed_area
  - slope
  - impervious_ratio
  - ksat
  - aridity_index
features:
  horizons:
  - 1
  lags:
  - 1
  - 3
  - 7
  rolling_windows:
  - 3
  - 7
  add_seasonal: true
  min_non_null_feature_ratio: 0.2
sequence:
  lookback_window: 14
  min_history_ratio: 0.12
graph:
  enabled: true
  k_neighbors: 3
  feature_columns:
  - slope
  - impervious_ratio
  - ksat
  - aridity_index
  - watershed_area
splits:
  strategy: unseen_station_and_future
  seed: 42
  train_station_fraction: 0.625
  valid_station_fraction: 0.125
  test_station_fraction: 0.25
  train_time_fraction: 0.7
  valid_time_fraction: 0.15
tail:
  exceedance_quantiles:
    conductance: 0.95
    turbidity: 0.9
  quantiles:
  - 0.1
  - 0.5
  - 0.9
  - 0.95
  quantile_weights:
  - 1.0
  - 1.0
  - 1.5
  - 2.0
  tail_weight_multiplier: 4.0
run:
  models:
  - torch_tail
  - seq_tcn_tail
  - seq_transformer_tail
models:
  linear_tail:
    alpha: 0.01
    max_iter: 1000
  gbdt_tail:
    n_estimators: 20
    max_depth: 3
    learning_rate: 0.05
    min_samples_leaf: 6
  torch_tail:
    graph_backend: gnn
    hidden_dims:
    - 32
    - 16
    dropout: 0.1
    batch_size: 64
    epochs: 2
    patience: 1
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 32
      num_layers: 2
      dropout: 0.1
  seq_tcn_tail:
    graph_backend: gnn
    hidden_dim: 32
    tcn_channels:
    - 32
    - 32
    kernel_size: 3
    dropout: 0.1
    batch_size: 32
    epochs: 2
    patience: 1
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 32
      num_layers: 2
      dropout: 0.1
  seq_transformer_tail:
    graph_backend: gnn
    hidden_dim: 32
    num_heads: 4
    num_layers: 1
    ff_multiplier: 2
    dropout: 0.1
    batch_size: 32
    epochs: 2
    patience: 1
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 32
      num_layers: 2
      dropout: 0.1
