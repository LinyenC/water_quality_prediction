project:
  name: hydrotail_dataset_bundle

paths:
  dataset_root: dataset
  output_dir: outputs/dataset_bundle_run

data:
  station_col: station_id
  station_id_width: 8
  date_col: date
  time_frequency: D
  targets:
    conductance: specific_conductance
    turbidity: turbidity
  dynamic_features:
    - discharge
    - precip
    - air_temp
    - tmin
    - tmax
    - pe
    - lai
    - swe
  static_features:
    - latitude
    - longitude
    - watershed_area
    - DEMmean
    - DROPmean
    - DEMstd
    - permeability
    - porosity
    - ksat
    - prcp_yearly_mean
    - PE_yearly_mean
    - LAImean
    - Qmean
    - SWEmean
    - population
  dataset_bundle:
    attributes_dir_candidates:
      - attritubes
      - attributes
    attributes_patterns:
      - "*.xlsx"
      - "*.csv"
    attributes_station_col: gauge_id
    attributes_rename_map:
      gauge_id: station_id
      Lat: latitude
      Lon: longitude
      Area: watershed_area
      Ksat: ksat
    time_series_dir_candidates:
      - time series
      - time_series
    time_series_sources:
      - folder: streamflow
        pattern: "*_streamflow.csv"
        rename_map:
          Qobs(m3/s): discharge
      - folder: daymet
        pattern: "*_forcing.csv"
        rename_map:
          Prec: precip
          Tmin: tmin
          Tmax: tmax
      - folder: PE
        pattern: "*_forcing.csv"
        rename_map:
          PE: pe
      - folder: LAI
        pattern: "*_forcing.csv"
        rename_map:
          LAI: lai
      - folder: SWE_SNODAS
        pattern: "*_forcing.csv"
        rename_map:
          SWE: swe
    wq_dir_candidates:
      - WQ
      - wq
    wq_cache_name: wq_observations.csv
    wq_sources:
      conductance:
        folder_candidates:
          - SEC
          - Paired_EC
        pattern: "*"
        source_value_col: EC
        date_column: Date
      turbidity:
        folder_candidates:
          - Tur
          - Paired_Tur
        pattern: "*"
        source_value_col: Tur
        date_column: Date

features:
  horizons:
    - 1
  lags:
    - 1
    - 3
    - 7
    - 14
    - 30
  rolling_windows:
    - 3
    - 7
    - 14
    - 30
  add_seasonal: true
  min_non_null_feature_ratio: 0.25

sequence:
  lookback_window: 30
  min_history_ratio: 0.15

graph:
  enabled: true
  k_neighbors: 5
  feature_columns:
    - watershed_area
    - DEMmean
    - DROPmean
    - ksat
    - prcp_yearly_mean
    - Qmean
    - SWEmean

splits:
  strategy: unseen_station_and_future
  seed: 42
  train_station_fraction: 0.7
  valid_station_fraction: 0.15
  test_station_fraction: 0.15
  train_time_fraction: 0.7
  valid_time_fraction: 0.15

tail:
  exceedance_quantiles:
    conductance: 0.95
    turbidity: 0.9
  quantiles:
    - 0.1
    - 0.5
    - 0.9
    - 0.95
    - 0.99
  quantile_weights:
    - 1.0
    - 1.0
    - 1.5
    - 2.0
    - 2.5
  tail_weight_multiplier: 4.0

run:
  models:
    - linear_tail
    - gbdt_tail
    - torch_tail
    # Optional sequence models:
    # - seq_tcn_tail
    # - seq_transformer_tail

models:
  linear_tail:
    alpha: 0.01
    max_iter: 2000
  gbdt_tail:
    n_estimators: 300
    max_depth: 3
    learning_rate: 0.05
    min_samples_leaf: 20
  torch_tail:
    graph_backend: neighbor_stats
    hidden_dims:
      - 128
      - 64
    dropout: 0.1
    batch_size: 256
    epochs: 25
    patience: 5
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
  seq_tcn_tail:
    graph_backend: neighbor_stats
    hidden_dim: 64
    tcn_channels:
      - 64
      - 64
    kernel_size: 3
    dropout: 0.1
    batch_size: 128
    epochs: 20
    patience: 4
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
  seq_transformer_tail:
    graph_backend: neighbor_stats
    hidden_dim: 64
    num_heads: 4
    num_layers: 2
    ff_multiplier: 2
    dropout: 0.1
    batch_size: 128
    epochs: 20
    patience: 4
    learning_rate: 0.001
    weight_decay: 0.0001
    gnn:
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
